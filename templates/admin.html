<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Citas — Zero Grados</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #f0f0f0; padding: 24px 16px; max-width: 600px; margin: auto; }
    h1 { font-size: 1.3rem; font-weight: 700; color: #f5c842; margin-bottom: 4px; }
    p.sub { color: #555; font-size: 0.85rem; margin-bottom: 20px; }

    .filtro {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }
    input[type="date"] {
      flex: 1;
      padding: 12px 14px;
      background: #222;
      border: 1px solid #333;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 0.9rem;
      outline: none;
    }
    input[type="date"]:focus { border-color: #f5c842; }
    .btn-filtro {
      padding: 12px 20px;
      background: #f5c842;
      color: #0a0a0a;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn-todas {
      padding: 12px 16px;
      background: #222;
      color: #f0f0f0;
      border: 1px solid #333;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .resumen {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }
    .stat .num { font-size: 1.6rem; font-weight: 800; color: #f5c842; }
    .stat .lbl { font-size: 0.7rem; color: #666; margin-top: 4px; }

    .cita-card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .cita-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .cita-hora { font-size: 1.1rem; font-weight: 800; color: #f5c842; }
    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-pendiente  { background: #1a1500; color: #f5c842; border: 1px solid #f5c842; }
    .badge-confirmada { background: #001a00; color: #4caf50; border: 1px solid #4caf50; }
    .badge-cancelada  { background: #1a0000; color: #e74c3c; border: 1px solid #e74c3c; }
    .badge-completada { background: #0a0a1a; color: #888; border: 1px solid #333; }

    .cita-info { font-size: 0.88rem; color: #ccc; line-height: 1.7; }
    .cita-info span { color: #888; }

    .acciones { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .btn-accion {
      padding: 7px 14px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #222;
      color: #f0f0f0;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-confirmar:hover { border-color: #4caf50; color: #4caf50; }
    .btn-completar:hover { border-color: #888; color: #888; }
    .btn-cancelar:hover  { border-color: #e74c3c; color: #e74c3c; }

    #sin-citas { text-align: center; color: #333; padding: 40px; }
    h2.seccion { font-size: 0.8rem; text-transform: uppercase; color: #555; letter-spacing: 1px; margin-bottom: 12px; }

    .nav-links { text-align: center; margin-top: 20px; }
    .nav-links a { color: #555; font-size: 0.8rem; text-decoration: none; margin: 0 10px; }
    .nav-links a:hover { color: #f5c842; }
  </style>
</head>
<body>
  <h1>✂️ Admin — Citas</h1>
  <p class="sub">Zero Grados Barbershop</p>

  <div class="filtro">
    <input type="date" id="filtro-fecha">
    <button class="btn-filtro" onclick="cargarCitas()">Filtrar</button>
    <button class="btn-todas" onclick="cargarTodas()">Todas</button>
  </div>

  <div class="resumen">
    <div class="stat"><div class="num" id="stat-total">0</div><div class="lbl">Total</div></div>
    <div class="stat"><div class="num" id="stat-pendiente">0</div><div class="lbl">Pendientes</div></div>
    <div class="stat"><div class="num" id="stat-confirmada">0</div><div class="lbl">Confirmadas</div></div>
    <div class="stat"><div class="num" id="stat-completada">0</div><div class="lbl">Completadas</div></div>
  </div>

  <h2 class="seccion">Citas (<span id="count">0</span>)</h2>
  <div id="lista-citas">
    <div id="sin-citas">Cargando...</div>
  </div>

  <div class="nav-links">
    <a href="/">Turnos</a>
    <a href="/citas">← Agendar cita</a>
    <a href="/barbero">Panel barbero</a>
  </div>

  <script>
    const hoy = new Date().toISOString().split('T')[0];
    document.getElementById('filtro-fecha').value = hoy;

    const estadoBadge = {
      pendiente:  'badge-pendiente',
      confirmada: 'badge-confirmada',
      cancelada:  'badge-cancelada',
      completada: 'badge-completada'
    };

    async function cargarCitas() {
      const fecha = document.getElementById('filtro-fecha').value;
      const url = fecha ? `/api/citas?fecha=${fecha}` : '/api/citas';
      const res = await fetch(url);
      const data = await res.json();
      renderCitas(data.citas);
    }

    async function cargarTodas() {
      document.getElementById('filtro-fecha').value = '';
      const res = await fetch('/api/citas');
      const data = await res.json();
      renderCitas(data.citas);
    }

    function renderCitas(citas) {
      document.getElementById('count').textContent = citas.length;
      document.getElementById('stat-total').textContent = citas.length;
      document.getElementById('stat-pendiente').textContent  = citas.filter(c => c.estado === 'pendiente').length;
      document.getElementById('stat-confirmada').textContent = citas.filter(c => c.estado === 'confirmada').length;
      document.getElementById('stat-completada').textContent = citas.filter(c => c.estado === 'completada').length;

      const lista = document.getElementById('lista-citas');
      if (citas.length === 0) {
        lista.innerHTML = '<div id="sin-citas">No hay citas para mostrar</div>';
        return;
      }

      lista.innerHTML = citas.map(c => `
        <div class="cita-card" id="cita-${c.id}">
          <div class="cita-header">
            <span class="cita-hora">${c.fecha} — ${c.hora}</span>
            <span class="badge ${estadoBadge[c.estado]}">${c.estado}</span>
          </div>
          <div class="cita-info">
            <b>${c.nombre}</b><br>
            <span>Servicio:</span> ${c.servicio}<br>
            <span>Tel:</span> ${c.telefono}
            ${c.email ? `<br><span>Email:</span> ${c.email}` : ''}
          </div>
          <div class="acciones">
            ${c.estado === 'pendiente' ? `<button class="btn-accion btn-confirmar" onclick="cambiarEstado(${c.id},'confirmada')">✓ Confirmar</button>` : ''}
            ${c.estado !== 'completada' && c.estado !== 'cancelada' ? `<button class="btn-accion btn-completar" onclick="cambiarEstado(${c.id},'completada')">✔ Completada</button>` : ''}
            ${c.estado !== 'cancelada' ? `<button class="btn-accion btn-cancelar" onclick="cambiarEstado(${c.id},'cancelada')">✕ Cancelar</button>` : ''}
          </div>
        </div>
      `).join('');
    }

    async function cambiarEstado(id, estado) {
      await fetch(`/api/cita/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ estado })
      });
      cargarCitas();
    }

    cargarCitas();
    setInterval(cargarCitas, 30000);
  </script>
</body>
</html>
